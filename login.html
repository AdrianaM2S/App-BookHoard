<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:300px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form onsubmit="return validarLogin()">
<input type="text" id="usuario" placeholder="Usuario" required>
<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Iniciar Sesión</button>
</form>

<p id="mensaje"></p>
</div>

<script>
function validarLogin(){

    var usuario = document.getElementById("usuario").value;
    var password = document.getElementById("password").value;

    if(usuario === "admin" && password === "1234"){
        alert("Login exitoso");
        return true;
    }else{
        document.getElementById("mensaje").innerText="Usuario o contraseña incorrectos";
        return false;
    }

}
</script>

</body>
</html>
