<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

    <link 
      rel="stylesheet" 
      href="styles/login.css" 
    /> 
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form onsubmit="return validarLogin()">
<input type="text" id="user" placeholder="User" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<p id="message"></p>
</div>

<script>
function validarLogin(){

    var user = document.getElementById("user").value;
    var password = document.getElementById("password").value;

    if(user === "admin" && password === "1234"){
        alert("Login Successful");
        return true;
    }else{
        document.getElementById("message").innerText="User or password are incorrect";
        return false;
    }

}
</script>

</body>
</html>
