<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Home</title>

<style>

/* FONDO GENERAL */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#5a5a5a;
    color:white;
}

/* HEADER */

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:15px;
    gap:15px;
}

/* SEARCH BAR */

.search-bar{
    background:white;
    border-radius:25px;
    padding:10px 20px;
    width:60%;
    border:none;
}

/* PERFIL */

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:black;
}

/* SECCIONES */

.section{
    padding:20px;
}

.section h2{
    margin-bottom:15px;
}

/* GRID LIBROS */

.book-grid{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

/* LIBROS (CUADROS VACÍOS) */

.book{
    width:120px;
    height:180px;
    background:#d9d9d9;
    border-radius:5px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<input
type="text"
class="search-bar"
placeholder="Search Bar">

<div class="profile"></div>

</div>

<!-- RECOMENDACIONES -->

<div class="section">

<h2>Recomendaciones</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

<!-- BESTSELLERS -->

<div class="section">

<h2>Bestsellers</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

<!-- FANTASIA -->

<div class="section">

<h2>Fantasia</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

</body>
</html>
