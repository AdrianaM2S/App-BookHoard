<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookHoard</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#5f5f5f;
    color:white;
    display:flex;
    justify-content:center;
}

/* CONTENEDOR PRINCIPAL */
.container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:40px 20px;
    box-sizing:border-box;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.logo{
    font-size:38px;
    font-weight:bold;
}

/* SEARCH */
.search-box{
    flex:1;
    display:flex;
    justify-content:center;
}

.search-bar{
    width:100%;
    max-width:500px;
    padding:14px 20px;
    border:none;
    border-radius:30px;
    font-size:16px;
}

.search-bar:focus{
    outline:none;
}

/* PERFIL */
.profile{
    width:45px;
    height:45px;
    background:black;
    border-radius:50%;
}

/* SECCIONES */
.section{
    margin-bottom:60px;
}

.section h2{
    font-size:28px;
    margin-bottom:20px;
}

/* LIBROS */
.book-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:20px;
    justify-content:center;
}

.book{
    width:100%;
    aspect-ratio: 2 / 3;
    background:#d9d9d9;
    border-radius:8px;
}

/* SEARCH PANEL */
.search-panel{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#5f5f5f;
    z-index:999;
    padding:25px;
    box-sizing:border-box;
}

.search-panel.show{
    display:block;
}

.search-header{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

.back-btn{
    width:60px;
    border:none;
    border-radius:14px;
    font-size:28px;
    cursor:pointer;
}

.search-panel-input{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px 20px;
    font-size:18px;
}

/* OPTIONS */
.option-grid{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.option-card{
    background:white;
    color:black;
    padding:12px 22px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

/* SIDE TAB (MÁS ANCHO) */
.side-tabs{
    position:fixed;
    right:5px;
    top:120px;
}

.side-tab{
    width:220px;
    height:65px;
    background:#e8e8e8;
    color:#222;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.side-tab:hover{
    background:#dcdcdc;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">BookHoard</div>

<div class="search-box">
<input type="text" class="search-bar" placeholder="Search Bar" onclick="openSearch()">
</div>

<div class="profile"></div>

</div>

<div class="section">
<h2>Recommendations</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

<div class="section">
<h2>Bestsellers</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

<div class="section">
<h2>Fantasy</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

</div>

<!-- SHELF BUTTON -->
<div class="side-tabs">
<div class="side-tab" onclick="goShelves()">Shelf</div>
</div>

<!-- SEARCH PANEL -->
<div class="search-panel" id="searchPanel">

<div class="search-header">
<button class="back-btn" onclick="closeSearch()">←</button>
<input type="text" class="search-panel-input" placeholder="Search Bar">
</div>

<div class="option-grid">
<div class="option-card">Best seller</div>
<div class="option-card">Autor</div>
<div class="option-card">Categoria</div>
</div>

</div>

<script>

function openSearch(){
    document.getElementById("searchPanel").classList.add("show");
}

function closeSearch(){
    document.getElementById("searchPanel").classList.remove("show");
}

function goShelves(){
    window.location.href = "shelf.html";
}

</script>

</body>
</html>
