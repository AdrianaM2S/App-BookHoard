<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Home</title>

<style>

/* FONDO */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#5a5a5a;
    color:white;
}

/* CONTENEDOR */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 0;
}

/* SEARCH BAR (ESCALA CORRECTA) */

.search-bar{
    width:45%;
    max-width:450px;
    padding:12px 18px;
    border-radius:25px;
    border:none;
    font-size:15px;
}

/* PERFIL */

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:black;
}

/* SECCIONES */

.section{
    margin-top:40px;
}

.section h2{
    margin-bottom:15px;
    font-size:22px;
}

/* GRID HORIZONTAL */

.book-grid{
    display:flex;
    gap:25px;
}

/* CUADROS LIBROS (AHORA MÁS PEQUEÑOS) */

.book{
    width:110px;
    height:170px;
    background:#d9d9d9;
    border-radius:6px;

    transition:0.3s;
}

/* HOVER */

.book:hover{
    transform:scale(1.05);
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<input
type="text"
class="search-bar"
placeholder="Search Bar">

<div class="profile"></div>

</div>

<!-- RECOMENDACIONES -->

<div class="section">

<h2>Recomendaciones</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

<!-- BESTSELLERS -->

<div class="section">

<h2>Bestsellers</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

<!-- FANTASIA -->

<div class="section">

<h2>Fantasia</h2>

<div class="book-grid">

<div class="book"></div>
<div class="book"></div>
<div class="book"></div>

</div>

</div>

</div>

</body>
</html>
