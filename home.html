<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookHoard</title>

<link rel="stylesheet" href="styles/home.css">

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">BookHoard</div>

<div class="search-box">
<input
type="text"
class="search-bar"
placeholder="Search Bar"
onclick="openSearch()">
</div>

<div class="profile"></div>

</div>



<div class="section">
<h2>Recommendations</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>



<div class="section">
<h2>Bestsellers</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>



<div class="section">
<h2>Fantasy</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>

</div>



<div class="search-panel" id="searchPanel">

<div class="search-content">

<div class="search-header">

<button class="back-btn" onclick="closeSearch()">←</button>

<input
type="text"
class="search-panel-input"
placeholder="Search books...">

</div>

<h3>Search by</h3>

<div class="option-grid">
<div class="option-card">Best Seller</div>
<div class="option-card">Author</div>
<div class="option-card">Category</div>
</div>

</div>

</div>

<script>

function openSearch(){
    document.getElementById("searchPanel").classList.add("show");
}

function closeSearch(){
    document.getElementById("searchPanel").classList.remove("show");
}

</script>

</body>
</html>
