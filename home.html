<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookHoard</title>

<style>



body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#5f5f5f;
    color:white;
}



.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding-top:30px;
}



.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}



.logo{
    font-size:38px;
    font-weight:bold;
}



.search-bar{
    width:420px;
    max-width:45%;
    padding:14px 20px;
    border:none;
    border-radius:30px;
    font-size:16px;
}

.search-bar:focus{
    outline:none;
}



.profile{
    width:45px;
    height:45px;
    background:black;
    border-radius:50%;
}



.section{
    margin-bottom:60px;
}

.section h2{
    margin-bottom:20px;
    font-size:30px;
}



.book-grid{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}



.book{
    width:115px;
    height:180px;
    background:#d9d9d9;
    border-radius:8px;
    transition:0.2s;
}

.book:hover{
    transform:scale(1.05);
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">



<div class="header">

<div class="logo">BookHoard</div>

<input type="text" class="search-bar" placeholder="Search Bar">

<div class="profile"></div>

</div>



<div class="section">
<h2>Recommendations</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>



<div class="section">
<h2>Bestsellers</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>


<div class="section">
<h2>Fantasy</h2>

<div class="book-grid">
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
<div class="book"></div>
</div>
</div>

</div>

</body>
</html>
