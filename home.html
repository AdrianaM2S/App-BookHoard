<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookHoard</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#5f5f5f;
    color:white;
}

/* CONTENEDOR CENTRAL */

.container{
    width:90%;
    max-width:1400px;
    margin:auto;
    padding-top:30px;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:38px;
    font-weight:bold;
}

.search-bar{
    width:420px;
    padding:14px 20px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

.search-bar:focus{
    outline:none;
}

.profile{
    width:45px;
    height:45px;
    background:black;
    border-radius:50%;
}

/* CONTENIDO + PANEL */

.main-content{
    display:flex;
    gap:40px;
    align-items:flex-start;
}

/* IZQUIERDA */

.books-area{
    flex:1;
}

/* SECCIONES */

.section{
    margin-bottom:60px;
}

.section h2{
    font-size:30px;
    margin-bottom:20px;
}

.book-grid{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
}

.book{
    width:115px;
    height:180px;
    background:#d9d9d9;
    border-radius:8px;
}

/* PANEL DERECHO MÁS ANCHO */

.shelf-panel{
    width:360px;
    min-height:700px;
    background:#ece8df;
    border-radius:14px;
    flex-shrink:0;
    overflow:hidden;
}

.shelf-header{
    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#222;
    border-bottom:1px solid #d8d2c6;
}

/* SEARCH PANEL */

.search-panel{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#f2f2f2;
    z-index:999;
    color:black;
    padding:30px;
    overflow:auto;
}

.search-panel.show{
    display:block;
}

.search-content{
    max-width:900px;
    margin:auto;
}

.search-header-panel{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:40px;
}

.back-btn{
    width:60px;
    height:52px;
    border:none;
    border-radius:12px;
    font-size:28px;
    cursor:pointer;
}

.search-panel-input{
    flex:1;
    padding:14px 20px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:18px;
}

.search-content h3{
    margin:30px 0 20px;
    font-size:30px;
}

.option-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.option-card{
    background:white;
    padding:35px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.option-card:hover{
    transform:scale(1.03);
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">BookHoard</div>

<input
type="text"
class="search-bar"
placeholder="Search Bar"
onclick="openSearch()">

<div class="profile"></div>

</div>

<div class="main-content">

<div class="books-area">

<div class="section">
<h2>Recommendations</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

<div class="section">
<h2>Bestsellers</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

<div class="section">
<h2>Fantasy</h2>
<div class="book-grid">
<div class="book"></div><div class="book"></div><div class="book"></div>
<div class="book"></div><div class="book"></div><div class="book"></div>
</div>
</div>

</div>

<div class="shelf-panel">
<div class="shelf-header">My Shelf</div>
</div>

</div>

</div>

<div class="search-panel" id="searchPanel">

<div class="search-content">

<div class="search-header-panel">

<button class="back-btn" onclick="closeSearch()">←</button>

<input
type="text"
class="search-panel-input"
placeholder="Search books...">

</div>

<h3>Search by</h3>

<div class="option-grid">
<div class="option-card">Best seller</div>
<div class="option-card">Autor</div>
<div class="option-card">Categoria</div>
</div>

</div>

</div>

<script>

function openSearch(){
    document.getElementById("searchPanel").classList.add("show");
}

function closeSearch(){
    document.getElementById("searchPanel").classList.remove("show");
}

</script>

</body>
</html>
